<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leia — Text to Speech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo-wrap">
        <h1 class="logo">Leia</h1>
      </div>
    </header>

    <main class="main">
      <div class="card">
        <div class="controls-row">
          <div class="field">
            <label for="language"><span data-i18n="language">Language</span></label>
            <div class="select-wrap">
              <select id="language"></select>
            </div>
          </div>
          <div class="field">
            <label for="voice"><span data-i18n="voice">Voice</span></label>
            <div class="select-wrap">
              <select id="voice"></select>
            </div>
          </div>
          <div class="field field-speed">
            <label for="speed"><span data-i18n="speed">Speed</span> <span class="badge" id="speed-value">1×</span></label>
            <div class="slider-track">
              <input type="range" id="speed" min="0.25" max="4" step="0.25" value="1">
              <div class="slider-labels">
                <span>0.25×</span>
                <span>4×</span>
              </div>
            </div>
          </div>
        </div>

        <div class="upload-area" id="upload-area">
          <input type="file" id="file-input" accept="image/*,application/pdf" hidden>
          <div id="upload-idle">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="28" height="28" aria-hidden="true">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            <p class="upload-main"><span data-i18n="uploadDrop">Drop a PDF or image, or</span> <button class="upload-browse" id="upload-browse-btn" data-i18n="uploadBrowse">browse</button></p>
            <p class="upload-sub" data-i18n="uploadFormats">PDF · PNG · JPG · WebP</p>
          </div>
          <div id="upload-busy" hidden>
            <span class="spinner"></span>
            <p id="upload-status"></p>
          </div>
        </div>

        <div class="field text-field">
          <label for="text"><span data-i18n="text">Text</span></label>
          <textarea
            id="text"
            placeholder="Enter the text you want to convert to speech…"
            rows="6"
            spellcheck="true"
          ></textarea>
          <span class="char-count"><span id="char-count">0</span> <span data-i18n="chars">chars</span></span>
        </div>

        <button id="generate-btn" class="btn-generate">
          <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
            <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
          </svg>
          <span class="btn-label" data-i18n="generateBtn">Generate Speech</span>
        </button>


      </div>

      <div class="output-card" id="output-section" hidden>
        <div class="output-header">
          <span class="output-label" data-i18n="outputLabel">Generated Audio</span>
          <span class="output-voice-tag" id="output-voice-tag"></span>
        </div>
        <div class="waveform-container">
          <div id="waveform"></div>
        </div>
        <div class="playback-controls">
          <button id="play-pause-btn" class="btn-play" aria-label="Play/Pause">
            <svg id="icon-play" viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
              <path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/>
            </svg>
            <svg id="icon-pause" viewBox="0 0 20 20" fill="currentColor" width="18" height="18" style="display:none">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
          </button>

          <div class="time-display">
            <span id="current-time">0:00</span>
            <span class="time-sep">/</span>
            <span id="total-time">0:00</span>
          </div>

          <div class="progress-mini" id="progress-mini">
            <div class="progress-fill" id="progress-fill"></div>
          </div>

          <button id="download-btn" class="btn-download">
            <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd"/>
            </svg>
            <span data-i18n="download">Download</span>
          </button>
        </div>
      </div>

      <div class="error-toast" id="error-toast" hidden>
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        <span id="error-message">Something went wrong.</span>
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/wavesurfer.js/7.10.3/wavesurfer.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
